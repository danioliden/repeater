name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/repeater.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/repeater.apk

  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r repeater.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: repeater.ipa

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - run: flutter pub get
      - run: flutter build web --release --base-href "/repeater/web/"

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-ipa, build-web]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/download-artifact@v4
        with:
          name: release-apk

      - uses: actions/download-artifact@v4
        with:
          name: release-ipa

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            repeater.apk
            repeater.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index.html
        run: |
          VERSION=${{ github.ref_name }}
          REPO=${{ github.repository }}
          APK_URL="https://github.com/$REPO/releases/download/$VERSION/repeater.apk"
          IPA_URL="https://github.com/$REPO/releases/download/$VERSION/repeater.ipa"

          sed -i "s|id=\"version\">[^<]*|id=\"version\">$VERSION|g" index.html
          sed -i "s|id=\"android-btn\" href=\"[^\"]*\"|id=\"android-btn\" href=\"$APK_URL\"|g" index.html
          sed -i "s|id=\"ios-btn\" href=\"[^\"]*\"|id=\"ios-btn\" href=\"$IPA_URL\"|g" index.html

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html web/
          git commit -m "Update to ${{ github.ref_name }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}